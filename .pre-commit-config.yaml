# Install both stages once with: prek install  (or: pre-commit install)
default_install_hook_types: [pre-commit, commit-msg]
repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff check
        entry: uv run ruff check . --fix
        language: system
        always_run: true
        pass_filenames: false
      - id: pyrefly-check
        name: pyrefly check
        entry: uv run pyrefly check .
        language: system
        always_run: true
        pass_filenames: false
      # Conventional Commits (https://www.conventionalcommits.org) — local,
      # dependency-free equivalent of ll-predictions' commitlint hook.
      - id: conventional-commit
        name: conventional commit
        entry: python3 scripts/check_conventional_commit.py
        language: system
        stages: [commit-msg]
